server:
  host: "0.0.0.0"
  port: 50201
  name: "GoFaGo Mobile Robot"
  description: "SiLA2 server for RB Kairos + ABB GoFa 15000 mobile manipulator"

logging:
  level: INFO
  file: logs/mobile_robot.log

ros:
  master_uri: "http://localhost:11311"
  namespace: "/setup1"
  services:
    navigate_to: /gofa_go/navigate_to
    arm_move_to: /gofa_go/arm/move_to
    gripper_control: /gofa_go/gripper/control
    emergency_stop: /gofa_go/emergency_stop
  topics:
    battery_state: /gofa_go/battery/state
    base_pose: /gofa_go/base/pose
    arm_state: /gofa_go/arm/state
    gripper_state: /gofa_go/gripper/state

arm:
  named_positions:
    Home:
      joints: [0, -90, 90, 0, 90, 0]
    Safe:
      joints: [0, -45, 45, 0, 45, 0]
    Travel:
      joints: [0, -60, 60, 0, 60, 0]
    Pickup:
      approach_height: 0.1
    Place:
      approach_height: 0.1

gripper:
  labware_profiles:
    96_well_plate:
      grip_force: 10.0
      grip_offset: 0.005
      width: 0.085
    384_well_plate:
      grip_force: 12.0
      grip_offset: 0.005
      width: 0.085
    reservoir:
      grip_force: 15.0
      grip_offset: 0.01
      width: 0.095
    tube_rack:
      grip_force: 20.0
      grip_offset: 0.015
      width: 0.13

safety:
  max_velocity: 0.5
  arm_max_velocity: 0.3
  min_battery: 20
  obstacle_distance: 0.3

stations:
  - name: Home
    type: Exchange
    x: 0.0
    y: 0.0
    height: 0.0
    description: "Robot home/charging position"
  - name: Opentrons
    type: Instrument
    x: 1.5
    y: 0.5
    height: 0.85
    description: "Opentrons Flex deck position"
    approach_offset:
      x: -0.3
      y: 0.0
  - name: Tecan
    type: Instrument
    x: 2.0
    y: 1.2
    height: 0.78
    description: "Tecan M200Pro carrier position"
    approach_offset:
      x: 0.0
      y: -0.3
  - name: Storage_A1
    type: Storage
    x: 0.5
    y: 2.0
    height: 0.9
    description: "Plate storage rack position A1"
  - name: Storage_A2
    type: Storage
    x: 0.5
    y: 2.2
    height: 0.9
    description: "Plate storage rack position A2"
  - name: Incubator
    type: Incubator
    x: 3.0
    y: 0.5
    height: 0.95
    description: "Incubator exchange position"
