{% extends "base.html" %}
{% block extra_css %}
<style>
.plate-card { border-left: 3px solid var(--labos-primary); cursor: pointer; }
.plate-card:hover { background: rgba(102,126,234,0.07); }
.badge-prepared  { background: #0dcaf0; color:#000; }
.badge-measured  { background: #198754; }
.badge-pipetted  { background: #6c757d; }

.well-cell {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem; font-weight: 600; color: #fff;
    cursor: pointer; position: relative;
    transition: transform .15s;
}
.well-cell:hover { transform: scale(1.2); z-index: 10; }
.well-cell.empty { background: #2a2a3a; color: #666; border-color: #444; }
.well-label-col { font-size: 0.65rem; color: #999; text-align: center; width: 34px; }
.well-label-row { font-size: 0.65rem; color: #999; width: 22px; line-height: 34px; text-align: right; padding-right: 4px; }

.well-tip {
    display: none; position: absolute; z-index: 100;
    bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1a1a2e; border: 1px solid #444; border-radius: 6px;
    padding: 6px 10px; white-space: nowrap; font-size: 0.72rem; pointer-events: none;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
.well-cell:hover .well-tip { display: block; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-grid-3x3-gap"></i> Plates</h2>
        <div class="d-flex gap-2 align-items-center">
            <div class="form-check form-switch mb-0 me-2">
                <input class="form-check-input" type="checkbox" id="heatmapToggle" checked onchange="toggleHeatmap(this.checked)">
                <label class="form-check-label text-muted small" for="heatmapToggle">Well grid</label>
            </div>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadPlates()">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <div class="row g-3">
        <!-- Plate list -->
        <div class="col-12 col-lg-4">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-list-ul"></i> Plate List</span>
                    <small class="text-muted" id="platesCount"></small>
                </div>
                <div class="card-body p-0" style="overflow-y:auto; max-height:72vh">
                    <div id="plateList">
                        <div class="text-center text-muted py-4">
                            <div class="spinner-border spinner-border-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Plate detail + heatmap -->
        <div class="col-12 col-lg-8" id="detailPanel">
            <div class="card">
                <div class="card-body text-center text-muted py-5">
                    <i class="bi bi-grid-3x3-gap fs-1 d-block mb-2" style="opacity:.3"></i>
                    Seleziona una piastra per vedere il layout dei pozzetti e i risultati di misura
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let selectedPlateId = null;
let heatmapEnabled = true;

function toggleHeatmap(enabled) {
    heatmapEnabled = enabled;
    // Persist choice
    try { localStorage.setItem('labos_heatmap', enabled ? '1' : '0'); } catch(e) {}
    if (selectedPlateId) showPlate(selectedPlateId);
}

function fmtDate(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleString('it-IT', {dateStyle:'short', timeStyle:'short'}); }
    catch { return iso.slice(0,16).replace('T',' '); }
}

function statusBadge(s) {
    const cls = {prepared:'badge-prepared', pipetted:'badge-pipetted', measured:'badge-measured'};
    return `<span class="badge ${cls[s]||'bg-secondary'}">${s||'—'}</span>`;
}

async function loadPlates() {
    const list = document.getElementById('plateList');
    list.innerHTML = '<div class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm"></div></div>';
    try {
        const r = await fetch('/api/db/plates?limit=100');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        document.getElementById('platesCount').textContent = `${d.count} piastr${d.count===1?'a':'e'}`;
        if (!d.plates || d.plates.length === 0) {
            list.innerHTML = '<div class="text-center text-muted py-5 px-3">Nessuna piastra ancora — esegui un workflow con uno step Opentrons.</div>';
            return;
        }
        list.innerHTML = d.plates.map(p => `
            <div class="plate-card p-3 border-bottom" onclick="showPlate('${p.plate_id}')">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="fw-bold small font-monospace">${p.plate_id}</div>
                        <div class="text-muted small">${p.recipe_name||'—'}</div>
                    </div>
                    ${statusBadge(p.status)}
                </div>
                <div class="d-flex gap-2 mt-1">
                    <small class="text-muted">${p.plate_type||'?'}</small>
                    <small class="text-muted">&bull; ${fmtDate(p.prepared_at)}</small>
                </div>
            </div>
        `).join('');
    } catch(e) {
        list.innerHTML = `<div class="text-danger text-center py-4">${e.message}</div>`;
    }
}

async function showPlate(plateId) {
    selectedPlateId = plateId;
    const panel = document.getElementById('detailPanel');
    panel.innerHTML = '<div class="card"><div class="text-center py-5"><div class="spinner-border"></div></div></div>';

    try {
        const [plateResp, heatmapResp] = await Promise.all([
            fetch(`/api/db/plates/${encodeURIComponent(plateId)}`),
            fetch(`/api/db/plates/${encodeURIComponent(plateId)}/heatmap`),
        ]);
        if (!plateResp.ok) throw new Error('Piastra non trovata');
        const plate = await plateResp.json();
        const heatmap = heatmapResp.ok ? await heatmapResp.json() : null;

        const wellInfo = {};
        for (const w of (plate.wells || [])) wellInfo[w.well_id] = w;

        let html = `<div class="card mb-3">
            <div class="card-header fw-bold font-monospace d-flex justify-content-between">
                <span><i class="bi bi-grid-3x3-gap"></i> ${plateId}</span>
                ${statusBadge(plate.status)}
            </div>
            <div class="card-body">
                <div class="row g-3 mb-3">
                    <div class="col-6 col-md-4"><div class="text-muted small">Tipo piastra</div><div class="small">${plate.plate_type||'—'}</div></div>
                    <div class="col-6 col-md-2"><div class="text-muted small">Dimensioni</div>${plate.total_wells||'?'} pozzetti (${plate.rows||'?'}×${plate.columns||'?'})</div>
                    <div class="col-6 col-md-2"><div class="text-muted small">HAL config</div>${plate.hal_config||'—'}</div>
                    <div class="col-6 col-md-2"><div class="text-muted small">Ricetta</div>${plate.recipe_name||'—'}</div>
                    <div class="col-6 col-md-2"><div class="text-muted small">Slot</div>${plate.labware_slot||'—'}</div>
                    <div class="col-12 col-md-4"><div class="text-muted small">Run ID</div><div class="small text-muted font-monospace">${plate.run_id||'—'}</div></div>
                    <div class="col-6 col-md-4"><div class="text-muted small">Preparata il</div>${fmtDate(plate.prepared_at)}</div>
                </div>`;

        if (heatmapEnabled && heatmap && heatmap.grid && heatmap.grid.length > 0) {
            const vMin = heatmap.value_min;
            const vMax = heatmap.value_max;
            const hasValues = vMin !== null && vMax !== null;

            html += `<h6 class="mt-3">Layout pozzetti${hasValues ? ' <small class="text-muted fw-normal">(colore = valore misurato)</small>' : ''}</h6>`;
            html += `<div style="overflow-x:auto"><div style="display:inline-block;padding-bottom:8px">`;

            // Column labels
            html += `<div style="display:flex;gap:3px;margin-bottom:2px;padding-left:26px">`;
            for (let c = 1; c <= heatmap.columns; c++) {
                html += `<div class="well-label-col">${c}</div>`;
            }
            html += `</div>`;

            // Grid rows
            for (let ri = 0; ri < heatmap.grid.length; ri++) {
                const rowLabel = heatmap.row_labels[ri];
                html += `<div style="display:flex;gap:3px;margin-bottom:3px;align-items:center">`;
                html += `<div class="well-label-row">${rowLabel}</div>`;
                for (const cell of heatmap.grid[ri]) {
                    const wi = wellInfo[cell.well_id] || {};
                    const hasVal = cell.value !== undefined && cell.value !== null;
                    const bg = hasVal ? valueToColor(cell.value, vMin, vMax) : null;
                    const style = bg ? `background:${bg}` : '';
                    const cls = hasVal ? '' : (wi.reagent_name ? '' : 'empty');
                    const tips = [];
                    tips.push(`<b>${cell.well_id}</b>`);
                    if (wi.reagent_name) tips.push(`Reagente: ${wi.reagent_name}`);
                    if (wi.volume_ul != null) tips.push(`Volume: ${wi.volume_ul} µl`);
                    if (wi.source_well) tips.push(`Sorgente: ${wi.source_well}`);
                    if (hasVal) tips.push(`Valore: <b>${cell.value.toFixed(4)}</b> ${cell.unit||''}`);
                    html += `<div class="well-cell ${cls}" style="${style}">
                        ${cell.well_id}
                        <div class="well-tip">${tips.join('<br>')}</div>
                    </div>`;
                }
                html += `</div>`;
            }
            html += `</div></div>`;

            if (hasValues) {
                html += `<div class="d-flex align-items-center gap-2 mt-2 mb-1" style="max-width:360px">
                    <small class="text-muted text-nowrap">${vMin.toFixed(4)}</small>
                    <div style="flex:1;height:10px;border-radius:4px;background:linear-gradient(to right,${valueToColor(vMin,vMin,vMax)},${valueToColor((vMin+vMax)/2,vMin,vMax)},${valueToColor(vMax,vMin,vMax)})"></div>
                    <small class="text-muted text-nowrap">${vMax.toFixed(4)}</small>
                </div>`;
            }
        } else if ((plate.wells||[]).length > 0) {
            html += `<p class="text-muted small mt-2">${plate.wells.length} pozzetti registrati — nessuna misura disponibile.</p>`;
        } else {
            html += `<p class="text-muted small mt-2">Nessun dato di pozzetto disponibile.</p>`;
        }

        html += `</div></div>`;

        // Measurement stats
        const mValues = (plate.measurements||[]).map(m=>m.value).filter(v=>v!==null&&v!==undefined);
        if (mValues.length > 0) {
            const mean = mValues.reduce((a,b)=>a+b,0)/mValues.length;
            const mn = Math.min(...mValues), mx = Math.max(...mValues);
            const std = Math.sqrt(mValues.reduce((s,v)=>s+(v-mean)**2,0)/mValues.length);
            html += `<div class="card mb-3">
                <div class="card-header"><i class="bi bi-bar-chart"></i> Statistiche misure (${mValues.length} pozzetti)</div>
                <div class="card-body">
                    <div class="row g-2 text-center">
                        <div class="col-3"><div class="text-muted small">Media</div><div class="fw-bold">${mean.toFixed(4)}</div></div>
                        <div class="col-3"><div class="text-muted small">Min</div><div class="fw-bold text-info">${mn.toFixed(4)}</div></div>
                        <div class="col-3"><div class="text-muted small">Max</div><div class="fw-bold text-warning">${mx.toFixed(4)}</div></div>
                        <div class="col-3"><div class="text-muted small">Dev. Std</div><div class="fw-bold">${std.toFixed(4)}</div></div>
                    </div>
                </div>
            </div>`;
        }

        // Well table (only if there's data)
        if ((plate.wells||[]).length > 0) {
            const measByWell = {};
            for (const m of (plate.measurements||[])) measByWell[m.well_id] = m;
            html += `<div class="card">
                <div class="card-header"><i class="bi bi-table"></i> Contenuto pozzetti</div>
                <div class="card-body p-0">
                <div class="table-responsive" style="max-height:260px">
                <table class="table table-sm mb-0">
                <thead><tr><th>Pozzetto</th><th>Reagente</th><th>Vol (µl)</th><th>Sorgente</th><th>Valore</th><th>Unità</th></tr></thead>
                <tbody>`;
            for (const w of plate.wells) {
                const m = measByWell[w.well_id] || {};
                html += `<tr>
                    <td><strong>${w.well_id}</strong></td>
                    <td>${w.reagent_name||'—'}</td>
                    <td>${w.volume_ul!=null?w.volume_ul:'—'}</td>
                    <td class="text-muted small">${w.source_well||'—'}</td>
                    <td>${m.value!=null?m.value.toFixed(4):'—'}</td>
                    <td class="text-muted small">${m.unit||'—'}</td>
                </tr>`;
            }
            html += `</tbody></table></div></div></div>`;
        }

        panel.innerHTML = html;
    } catch(e) {
        panel.innerHTML = `<div class="card"><div class="text-danger text-center py-4">${e.message}</div></div>`;
    }
}

function valueToColor(v, vMin, vMax) {
    if (v === null || v === undefined || vMin === vMax) return '#4a90d9';
    const t = Math.max(0, Math.min(1, (v - vMin) / (vMax - vMin)));
    const stops = [[0,[66,133,244]],[0.33,[52,168,83]],[0.67,[251,188,4]],[1.0,[234,67,53]]];
    for (let i = 0; i < stops.length - 1; i++) {
        const [t0,c0] = stops[i], [t1,c1] = stops[i+1];
        if (t >= t0 && t <= t1) {
            const f = (t-t0)/(t1-t0);
            return `rgb(${Math.round(c0[0]+(c1[0]-c0[0])*f)},${Math.round(c0[1]+(c1[1]-c0[1])*f)},${Math.round(c0[2]+(c1[2]-c0[2])*f)})`;
        }
    }
    return '#4a90d9';
}

window.handleWebSocketMessage = window.handleWebSocketMessage || function(){};

document.addEventListener('DOMContentLoaded', () => {
    try {
        const saved = localStorage.getItem('labos_heatmap');
        if (saved === '0') {
            heatmapEnabled = false;
            document.getElementById('heatmapToggle').checked = false;
        }
    } catch(e) {}
    loadPlates();
    if (location.hash && location.hash.length > 1) showPlate(location.hash.slice(1));
});
</script>
{% endblock %}
