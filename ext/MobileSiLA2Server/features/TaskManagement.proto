// TaskManagement.proto
// Generated from TaskManagement.sila.xml
// SiLA2 Feature for Mobile Robot Task Management

syntax = "proto3";

package sila2.it.bicoccalab.taskmanagement.v1;

// ═══════════════════════════════════════════════════════════════════════════
//                              DATA TYPES
// ═══════════════════════════════════════════════════════════════════════════

// Information about an available task
message TaskInfo {
    string task_id = 1;
    string task_name = 2;
    int32 subtask_count = 3;
}

// ═══════════════════════════════════════════════════════════════════════════
//                              PROPERTY REQUESTS/RESPONSES
// ═══════════════════════════════════════════════════════════════════════════

// Get_AvailableTasks
message Get_AvailableTasks_Request {}

message Get_AvailableTasks_Response {
    repeated TaskInfo tasks = 1;
}

// Get_CurrentTaskId
message Get_CurrentTaskId_Request {}

message Get_CurrentTaskId_Response {
    string current_task_id = 1;
}

// Get_CurrentSubtask
message Get_CurrentSubtask_Request {}

message Get_CurrentSubtask_Response {
    string current_subtask = 1;
}

// Get_TaskStatus
message Get_TaskStatus_Request {}

message Get_TaskStatus_Response {
    string task_status = 1;  // Idle, Executing, Paused, Completed, Failed, Cancelled
}

// Get_RobotConnectionStatus
message Get_RobotConnectionStatus_Request {}

message Get_RobotConnectionStatus_Response {
    string connection_status = 1;  // Connected, Disconnected, Connecting, Error
}

// ═══════════════════════════════════════════════════════════════════════════
//                              COMMAND REQUESTS/RESPONSES
// ═══════════════════════════════════════════════════════════════════════════

// RefreshTasks
message RefreshTasks_Request {}

message RefreshTasks_Response {
    int32 task_count = 1;
}

// ExecuteTask - Observable command with streaming progress
message ExecuteTask_Request {
    string task_id = 1;
    string execution_mode = 2;  // Normal, StepByStep, DryRun
}

// Unified streaming response: both progress updates and final result.
// is_final=false  -> progress update: read current_subtask, progress, status
// is_final=true   -> final result:    read success, message, execution_time
message ExecuteTask_Response {
    bool success = 1;
    string message = 2;
    float execution_time = 3;
    bool is_final = 4;
    string current_subtask = 5;
    float progress = 6;  // 0-100
    string status = 7;
}

// CancelTask
message CancelTask_Request {}

message CancelTask_Response {
    bool cancelled = 1;
}

// GetTaskDetails
message GetTaskDetails_Request {
    string task_id = 1;
}

message GetTaskDetails_Response {
    string task_id = 1;
    string task_name = 2;
    string subtasks_json = 3;  // JSON array of subtask info
}

// ConnectToRobot
message ConnectToRobot_Request {
    string ros_master_uri = 1;  // Empty = use config default
}

message ConnectToRobot_Response {
    bool connected = 1;
    string message = 2;
}

// ═══════════════════════════════════════════════════════════════════════════
//                              SERVICE DEFINITION
// ═══════════════════════════════════════════════════════════════════════════

service TaskManagement {
    // Properties
    rpc Get_AvailableTasks(Get_AvailableTasks_Request) returns (Get_AvailableTasks_Response);
    rpc Get_CurrentTaskId(Get_CurrentTaskId_Request) returns (Get_CurrentTaskId_Response);
    rpc Get_CurrentSubtask(Get_CurrentSubtask_Request) returns (Get_CurrentSubtask_Response);
    rpc Get_TaskStatus(Get_TaskStatus_Request) returns (Get_TaskStatus_Response);
    rpc Get_RobotConnectionStatus(Get_RobotConnectionStatus_Request) returns (Get_RobotConnectionStatus_Response);
    
    // Commands
    rpc RefreshTasks(RefreshTasks_Request) returns (RefreshTasks_Response);
    rpc ExecuteTask(ExecuteTask_Request) returns (stream ExecuteTask_Response);  // Streaming for progress
    rpc CancelTask(CancelTask_Request) returns (CancelTask_Response);
    rpc GetTaskDetails(GetTaskDetails_Request) returns (GetTaskDetails_Response);
    rpc ConnectToRobot(ConnectToRobot_Request) returns (ConnectToRobot_Response);
}
