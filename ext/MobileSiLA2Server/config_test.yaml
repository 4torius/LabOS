arm:
  named_positions:
    Home:
      joints:
      - 0
      - -90
      - 90
      - 0
      - 90
      - 0
    Pickup:
      approach_height: 0.1
    Place:
      approach_height: 0.1
    Safe:
      joints:
      - 0
      - -45
      - 45
      - 0
      - 45
      - 0
    Travel:
      joints:
      - 0
      - -60
      - 60
      - 0
      - 60
      - 0
gripper:
  labware_profiles:
    384_well_plate:
      grip_force: 12.0
      grip_offset: 0.005
      width: 0.085
    96_well_plate:
      grip_force: 10.0
      grip_offset: 0.005
      width: 0.085
    reservoir:
      grip_force: 15.0
      grip_offset: 0.01
      width: 0.095
    tube_rack:
      grip_force: 20.0
      grip_offset: 0.015
      width: 0.13
logging:
  file: logs/mobile_robot.log
  level: INFO
port: 50099
ros:
  master_uri: http://localhost:11311
  namespace: /setup1
  services:
    arm_move_to: /gofa_go/arm/move_to
    emergency_stop: /gofa_go/emergency_stop
    gripper_control: /gofa_go/gripper/control
    navigate_to: /gofa_go/navigate_to
  task_action:
    name: state_exec
    tasks_path: /home/inspection/exsensia/subtask
    timeout: 300.0
  task_service:
    name: getSubtasksInfo
    refresh_interval: 30.0
  topics:
    arm_state: /gofa_go/arm/state
    base_pose: /gofa_go/base/pose
    battery_state: /gofa_go/battery/state
    gripper_state: /gofa_go/gripper/state
safety:
  arm_max_velocity: 0.3
  max_velocity: 0.5
  min_battery: 20
  obstacle_distance: 0.3
server:
  description: SiLA2 server for RB Kairos + ABB GoFa 15000 mobile manipulator
  host: 0.0.0.0
  name: GoFaGo Mobile Robot
  port: 50053
stations:
- description: Robot home/charging position
  height: 0.0
  name: Home
  type: Exchange
  x: 0.0
  y: 0.0
- approach_offset:
    x: -0.3
    y: 0.0
  description: Opentrons Flex deck position
  height: 0.85
  name: Opentrons
  type: Instrument
  x: 1.5
  y: 0.5
- approach_offset:
    x: 0.0
    y: -0.3
  description: Tecan M200Pro carrier position
  height: 0.78
  name: Tecan
  type: Instrument
  x: 2.0
  y: 1.2
- description: Plate storage rack position A1
  height: 0.9
  name: Storage_A1
  type: Storage
  x: 0.5
  y: 2.0
- description: Plate storage rack position A2
  height: 0.9
  name: Storage_A2
  type: Storage
  x: 0.5
  y: 2.2
- description: Incubator exchange position
  height: 0.95
  name: Incubator
  type: Incubator
  x: 3.0
  y: 0.5
